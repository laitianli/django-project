{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}默认标题{% endblock %}</title>
    <!-- 引入静态文件 -->
    <!-- Bootstrap CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <!-- Font Awesome 图标 -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> -->
    <link href="{% static './bootstrap-5.3.0-alpha1/dist/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static './css/all.min.css' %}" rel="stylesheet">
    <style>
        :root {
            --main-purple: #4284c1;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        /* 顶部导航条样式 */
        .navbar {
            background-color: var(--main-purple);
            padding: 0.5rem 1rem;
        }

        .navbar-brand,
        .navbar-text {
            color: white !important;
            font-weight: bold;
        }
    </style>
    
    {% block extra_css %}{% endblock %}

    {% block css %}{% endblock %}
</head>

<body>
    <header>
        <!-- 顶部导航条 -->
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Qemu虚拟机管理系统</span>
                <div class="d-flex">
                    <p class="fw-normal  me-1  col-form-label">用户名: </p>
                    <p class="fw-normal  me-3  col-form-label" id="username">haizhi</p>
                    <button class="btn btn-danger me-5" id="userLogout">退出</button>
                    <div class="row">
                        <label for="" class="col-md-5 text-end col-form-label">语言：</label>
                        <div class="col-md-7">
                            <select name="" id="languageSelectID" class="form-select">
                                <option value="">中文</option>
                                <option value="">English</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- 主内容区将由子模板填充 -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; {% now "Y" %} 我的网站. 保留所有权利.</p>
    </footer>

    <!-- 公共JS文件 -->
    <script src="{% static './bootstrap-5.3.0-alpha1/dist/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static './js/jquery-3.6.0.min.js' %}"></script>

    {% block javascript %}
    <!-- 子模板可以在此添加页面特定的JS -->
    {% endblock %}
</body>

</html>
